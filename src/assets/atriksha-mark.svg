<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 64" role="img" aria-labelledby="title desc">
  <title id="title">Atriksha AK monogram</title>
  <desc id="desc">A structural A joined with a forward-facing K and a rising amber trajectory.</desc>
  <defs>
    <linearGradient id="a-beam" x1="7" y1="58" x2="38" y2="5" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1d4ed8"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="k-beam" x1="36" y1="8" x2="72" y2="58" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0891b2"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
    <linearGradient id="trajectory" x1="18" y1="45" x2="61" y2="14" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
  </defs>

  <!-- The load-bearing A: a broad base and a precise apex communicate strength. -->
  <path d="M3 58 27.5 5h12L17 58Z" fill="url(#a-beam)"/>
  <path d="M27.5 5h12l13.2 28.6-8.2 9.3-11-25.2L17 58H3Z" fill="#2563eb" fill-opacity=".5"/>

  <!-- The K shares the A's right beam, making a compact, ownable AK monogram. -->
  <path d="M35 5h11v20.7L62.6 5H77L54 31.7 78.5 58H63.7L46 38.7V58H35Z" fill="url(#k-beam)"/>

  <!-- A single growth trajectory doubles as the A crossbar. -->
  <path d="M17.5 44.7c13.8-1.2 27.3-9.7 38.7-24.5" fill="none" stroke="#071521" stroke-opacity=".5" stroke-width="8" stroke-linecap="round"/>
  <path d="M17.5 43c13.8-1.2 27.3-9.7 38.7-24.5" fill="none" stroke="url(#trajectory)" stroke-width="4.6" stroke-linecap="round"/>
  <path d="m52.8 14.9 12.6-2.5-5.2 11.8Z" fill="#f97316"/>

  <!-- Small precision datum: the point where engineering and intelligence meet. -->
  <circle cx="40.5" cy="34" r="3.1" fill="#f8fafc" stroke="#0891b2" stroke-width="1.8"/>
</svg>
